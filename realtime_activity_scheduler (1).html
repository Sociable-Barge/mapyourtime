<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Real-Time Activity Scheduler</title>
<link rel="stylesheet" href="scheduler.css" />
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <h1>Real-Time Activity Scheduler</h1>
      <div class="sub">Drag to reorder (left grip), edit inline, and use the Fixed? checkbox to set a locked start time for any activity. Start times update live.</div>
    </div>
    <label class="toggle" title="Toggle dark mode">
      <span class="muted">Dark</span>
      <input id="modeToggle" type="checkbox" aria-label="Dark mode toggle" />
    </label>
  </div>

  <div class="card">
    <div class="preset-row">
      <button class="preset-btn" id="presetPreflightBtn" type="button">Pre-Flight</button>
      <button class="preset-btn" id="presetDanceBtn" type="button">Dance Class</button>
    </div>
    <div class="toolbar">
      <input type="text" id="customName" placeholder="Add activity (e.g., Pack car)" class="grow" />
      <input type="number" id="customMinutes" placeholder="Minutes" min="1" />
      <button class="btn grow" id="addBtn">Add</button>
    </div>
    <div id="formError" class="validation" role="alert" aria-live="polite"></div>
  </div>

  <div class="card table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:44px"></th>
          <th class="col-activity">Activity</th>
          <th class="col-minutes">Minutes</th>
          <th style="width:160px">Start Time</th>
          <th style="width:88px">Fixed?</th>
          <th style="width:60px"></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="card map-card">
    <h2 class="section-title">Map</h2>
    <div class="map-toolbar">
      <input type="text" id="mapFrom" placeholder="From (e.g., Home)" />
      <input type="text" id="mapTo" placeholder="To (e.g., Airport)" />
      <select id="mapMode" aria-label="Travel mode">
        <option value="driving">Driving</option>
        <option value="walking">Walking</option>
        <option value="transit">Transit</option>
      </select>
      <button class="btn" id="mapUpdateBtn" type="button">Show Map</button>
      <a class="btn map-link" id="mapOpenLink" href="#" target="_blank" rel="noopener noreferrer">Open</a>
    </div>
    <div id="mapError" class="validation" role="alert" aria-live="polite"></div>
    <iframe id="mapFrame" class="map-frame" loading="lazy" referrerpolicy="no-referrer-when-downgrade" title="Google map preview"></iframe>
  </div>
</div>
<script src="scheduler.js"></script>
</body>
</html>
